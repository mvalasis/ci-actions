name: contract-check self-test

# Two layers: (1) the offline engine self-test (deterministic JSON fixtures, no network —
# the real regression guard); (2) an optional live report-mode smoke run of the action against
# chosen endpoints. fail-on-critical is forced off so this can never block ci-actions itself.

on:
  push:
    paths: ['contract-check/**', '.github/workflows/contract-check-selftest.yml']
  workflow_dispatch:
    inputs:
      endpoints:
        description: 'JSON name->url map to smoke-check live (report-mode)'
        required: false
        default: '{"lampakia-products":"https://www.lampakia.gr/wp-json/wc/store/products?per_page=1"}'

permissions:
  contents: read

jobs:
  engine-selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Offline engine self-test (no network)
        working-directory: contract-check
        run: node scripts/selftest.mjs

  live-smoke:
    runs-on: ubuntu-latest
    needs: engine-selftest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: ./contract-check
        with:
          endpoints: ${{ inputs.endpoints }}
          fail-on-critical: 'false'
          verify-token: ${{ secrets.VERIFY_HOMEPAGE_TOKEN }}
          max-endpoints: '8'
