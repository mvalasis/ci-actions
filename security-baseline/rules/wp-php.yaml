# security-baseline — vendored WP/PHP SAST rules (AIR-GAPPED: local config, no registry fetch).
#
# These model the real WordPress trust boundaries that the community `p/security-audit`
# pack barely covers: nonce/CSRF, capability checks, $wpdb->prepare, the sanitize/escape
# boundary, object injection, LFI, REST info-disclosure, weak signing crypto.
#
# TIER: every rule ships `severity: WARNING` — it NEVER blocks at the default ERROR cut.
# The engine (tiers.mjs) maps each `metadata.checkId` to a tier; T1 ids are promotable to
# CRITICAL per-caller via the `critical-checks` action input. So adding this pack to the
# shared gate cannot newly-block any repo on the @v1 move.
#
# FP DISCIPLINE (load-bearing — proven against the real fleet, where WP core + vendor libs
# are committed): every rule carries paths.exclude for wp-admin/, wp-includes/, vendor/,
# *.phar, woocommerce/, and test files, or it drowns in core/library hits. Handler rules
# additionally require the function to (a) read a request superglobal AND (b) hit a sink,
# so an internal helper guarded by its caller does not false-fire.

rules:
  # ---- CWE-89: SQL injection — $wpdb interpolation without ->prepare ----
  - id: wp-sql-unprepared
    languages: [php]
    severity: WARNING
    message: >-
      $wpdb query with an interpolated PHP variable and no $wpdb->prepare() — SQL injection
      (CWE-89). Bind values with $wpdb->prepare("... %d/%s ...", $args).
    metadata: { checkId: wp-sql-unprepared, cwe: "CWE-89", owasp: "A03:2021-Injection", tier: T1 }
    paths:
      exclude: ["**/wp-admin/**", "**/wp-includes/**", "**/vendor/**", "**/node_modules/**", "**/*.phar", "**/woocommerce/**", "**/tests/**", "**/*test*.php"]
    patterns:
      - pattern-either:
          - pattern: $wpdb->query("...$X...")
          - pattern: $wpdb->get_results("...$X...")
          - pattern: $wpdb->get_var("...$X...")
          - pattern: $wpdb->get_row("...$X...")
          - pattern: $wpdb->get_col("...$X...")
      - pattern-not: $wpdb->$M($wpdb->prepare(...))

  # ---- CWE-352: CSRF — state-changing request handler with no nonce verification ----
  - id: wp-nonce-missing
    languages: [php]
    severity: WARNING
    message: >-
      A function reads request input ($_POST/$_GET/$_REQUEST) and performs a state change
      ($wpdb write / update_option / post mutation) with NO nonce check
      (check_ajax_referer / check_admin_referer / wp_verify_nonce) anywhere in its body —
      possible CSRF (CWE-352). If the guard lives in a parent dispatcher this is a false
      positive; keep WARN unless the repo is verified clean before promoting.
    metadata: { checkId: wp-nonce-missing, cwe: "CWE-352", owasp: "A01:2021-Broken-Access-Control", tier: T1 }
    paths:
      exclude: ["**/wp-admin/**", "**/wp-includes/**", "**/vendor/**", "**/node_modules/**", "**/*.phar", "**/woocommerce/**", "**/tests/**", "**/*test*.php"]
    patterns:
      # the matched node is the state-changing SINK; pattern-regex is scoped to it, so it
      # fires only when request data flows DIRECTLY into the write (low FP). pattern-not-inside
      # clears the match if ANY nonce check exists in the enclosing function.
      - pattern-either:
          - pattern: $wpdb->query(...)
          - pattern: $wpdb->insert(...)
          - pattern: $wpdb->update(...)
          - pattern: $wpdb->delete(...)
          - pattern: $wpdb->replace(...)
          - pattern: update_option(...)
          - pattern: delete_option(...)
          - pattern: update_post_meta(...)
          - pattern: delete_post_meta(...)
          - pattern: wp_insert_post(...)
          - pattern: wp_update_post(...)
          - pattern: wp_delete_post(...)
      - pattern-regex: '\$_(POST|GET|REQUEST)\b'
      # deep-expression-statement guard: excludes the sink if the enclosing function calls a
      # nonce check in ANY position (bare statement, if-condition, `|| wp_die()`).
      - pattern-not-inside: function $FN(...) { ... <... check_ajax_referer(...) ...>; ... }
      - pattern-not-inside: function $FN(...) { ... <... check_admin_referer(...) ...>; ... }
      - pattern-not-inside: function $FN(...) { ... <... wp_verify_nonce(...) ...>; ... }

  # ---- CWE-862: missing authorization — privileged request handler with no capability check ----
  - id: wp-cap-missing
    languages: [php]
    severity: WARNING
    message: >-
      A function reads request input and performs a privileged/state-changing action with NO
      capability check (current_user_can / map_meta_cap / user_can) — any logged-in user
      (incl. subscriber) may reach it (CWE-862). False-positive if the cap check is in a
      parent dispatcher; keep WARN until the repo is verified.
    metadata: { checkId: wp-cap-missing, cwe: "CWE-862", owasp: "A01:2021-Broken-Access-Control", tier: T1 }
    paths:
      exclude: ["**/wp-admin/**", "**/wp-includes/**", "**/vendor/**", "**/node_modules/**", "**/*.phar", "**/woocommerce/**", "**/tests/**", "**/*test*.php"]
    patterns:
      - pattern-either:
          - pattern: $wpdb->query(...)
          - pattern: $wpdb->insert(...)
          - pattern: $wpdb->update(...)
          - pattern: $wpdb->delete(...)
          - pattern: update_option(...)
          - pattern: delete_post_meta(...)
          - pattern: wp_delete_post(...)
          - pattern: wp_insert_user(...)
      - pattern-regex: '\$_(POST|GET|REQUEST)\b'
      - pattern-not-inside: function $FN(...) { ... <... current_user_can(...) ...>; ... }
      - pattern-not-inside: function $FN(...) { ... <... map_meta_cap(...) ...>; ... }
      - pattern-not-inside: function $FN(...) { ... <... user_can(...) ...>; ... }

  # ---- CWE-502: PHP object injection — unserialize() of request data ----
  - id: wp-unserialize-user-input
    languages: [php]
    severity: WARNING
    message: >-
      unserialize() on request data without ['allowed_classes' => false] — PHP object
      injection (CWE-502). Use json_decode, or pass ['allowed_classes' => false].
    metadata: { checkId: wp-unserialize, cwe: "CWE-502", owasp: "A08:2021-Data-Integrity", tier: T1 }
    paths:
      exclude: ["**/wp-admin/**", "**/wp-includes/**", "**/vendor/**", "**/node_modules/**", "**/*.phar", "**/woocommerce/**", "**/tests/**", "**/*test*.php"]
    patterns:
      - pattern-either:
          - pattern: unserialize($_POST[...])
          - pattern: unserialize($_GET[...])
          - pattern: unserialize($_REQUEST[...])
          - pattern: unserialize($_COOKIE[...])
          - pattern: unserialize(base64_decode($_POST[...]))
          - pattern: unserialize(base64_decode($_GET[...]))
          - pattern: unserialize(base64_decode($_COOKIE[...]))
      - pattern-not: unserialize(..., ['allowed_classes' => false])
      - pattern-not: unserialize(..., ['allowed_classes' => []])

  # ---- CWE-98/22: LFI / path traversal — file op with request-controlled path ----
  - id: wp-file-include-user-input
    languages: [php]
    severity: WARNING
    message: >-
      File include/read/open/delete with a request-controlled path component and no
      sanitize_file_name / basename / realpath / allow-list — LFI / path traversal
      (CWE-98 / CWE-22).
    metadata: { checkId: wp-file-include, cwe: "CWE-98", owasp: "A03:2021-Injection", tier: T1 }
    paths:
      exclude: ["**/wp-admin/**", "**/wp-includes/**", "**/vendor/**", "**/node_modules/**", "**/*.phar", "**/woocommerce/**", "**/tests/**", "**/*test*.php"]
    patterns:
      - pattern-either:
          - pattern: include($ARG)
          - pattern: require($ARG)
          - pattern: readfile($ARG)
          - pattern: file_get_contents($ARG)
      # $ARG must carry request input ...
      - metavariable-pattern:
          metavariable: $ARG
          pattern-either:
            - pattern: <... $_GET ...>
            - pattern: <... $_POST ...>
            - pattern: <... $_REQUEST ...>
      # ... and must NOT be wrapped in a path sanitizer (rule-level pattern-not; the
      # metavariable-pattern form of pattern-not does not exclude reliably in this engine).
      - pattern-not: include(<... basename(...) ...>)
      - pattern-not: include(<... sanitize_file_name(...) ...>)
      - pattern-not: include(<... realpath(...) ...>)
      - pattern-not: require(<... basename(...) ...>)
      - pattern-not: require(<... sanitize_file_name(...) ...>)
      - pattern-not: require(<... realpath(...) ...>)
      - pattern-not: readfile(<... basename(...) ...>)
      - pattern-not: readfile(<... sanitize_file_name(...) ...>)
      - pattern-not: file_get_contents(<... basename(...) ...>)
      - pattern-not: file_get_contents(<... sanitize_file_name(...) ...>)

  # ---- CWE-209: information disclosure — exception detail in a REST / AJAX response ----
  - id: wp-rest-exception-detail
    languages: [php]
    severity: WARNING
    message: >-
      Exception message / file / line / stack-trace returned to the client in a WP_REST_Response,
      rest_ensure_response(), a WordPress AJAX wp_send_json()/wp_send_json_error()/
      wp_send_json_success() body, or a wp_die() call — leaks internal paths + plugin internals to
      the caller (CWE-209). Log server-side; return a generic {error:'internal'} to the client.
    metadata: { checkId: wp-rest-error-detail, cwe: "CWE-209", owasp: "A05:2021-Misconfiguration", tier: T1 }
    paths:
      exclude: ["**/wp-admin/**", "**/wp-includes/**", "**/vendor/**", "**/node_modules/**", "**/*.phar", "**/tests/**", "**/*test*.php"]
    patterns:
      # the SINK is the REST response constructor / rest_ensure_response / AJAX json emitter / wp_die;
      # $BODY is its data (first) argument. The metavariable-pattern then requires a Throwable
      # accessor (getMessage/getFile/getLine/getTraceAsString) ANYWHERE inside that body — so the rule
      # fires ONLY when an exception-variable accessor is actually carried into the sink (low FP:
      # wp_die('Access denied') has no accessor, so it never trips).
      - pattern-either:
          - pattern: new \WP_REST_Response($BODY, ...)
          - pattern: new WP_REST_Response($BODY, ...)
          - pattern: rest_ensure_response($BODY)
          - pattern: wp_send_json_error($BODY, ...)
          - pattern: wp_send_json_success($BODY, ...)
          - pattern: wp_send_json($BODY, ...)
          - pattern: wp_die($BODY, ...)
      - metavariable-pattern:
          metavariable: $BODY
          pattern-either:
            - pattern: <... $E->getMessage() ...>
            - pattern: <... $E->getFile() ...>
            - pattern: <... $E->getLine() ...>
            - pattern: <... $E->getTraceAsString() ...>

  # ---- CWE-209: WP_Error detail in a REST / AJAX response (ADVISORY / T2 — too FP-heavy to promote) ----
  - id: wp-rest-wp-error-detail
    languages: [php]
    severity: WARNING
    message: >-
      WP_Error::get_error_message() reaching a WP_REST_Response / rest_ensure_response /
      wp_send_json() / wp_die() response body. ADVISORY (T2): usually this IS the intended
      client-facing message — but a WP_Error wrapping $wpdb->last_error or a caught exception leaks
      internal detail to the caller (CWE-209). Confirm the WP_Error message is curated/safe; never
      promote fleet-wide (legit benign error strings would false-fire).
    metadata: { checkId: wp-rest-wp-error-detail, cwe: "CWE-209", owasp: "A05:2021-Misconfiguration", tier: T2 }
    paths:
      exclude: ["**/wp-admin/**", "**/wp-includes/**", "**/vendor/**", "**/node_modules/**", "**/*.phar", "**/tests/**", "**/*test*.php"]
    patterns:
      - pattern-either:
          - pattern: new \WP_REST_Response($BODY, ...)
          - pattern: new WP_REST_Response($BODY, ...)
          - pattern: rest_ensure_response($BODY)
          - pattern: wp_send_json_error($BODY, ...)
          - pattern: wp_send_json_success($BODY, ...)
          - pattern: wp_send_json($BODY, ...)
          - pattern: wp_die($BODY, ...)
      - metavariable-pattern:
          metavariable: $BODY
          pattern: <... $WPE->get_error_message() ...>

  # ---- CWE-209 LAUNDERED: error detail that the plain inline grep above MISSES, because it is
  #      routed through an intermediate object/array/redirect before the sink. These four rules
  #      emit a SEPARATE checkId (wp-rest-error-detail-laundered) so promoting the inline
  #      `wp-rest-error-detail` does not also promote (and possibly newly-block on) these heuristics;
  #      a caller opts in independently once it has eyeballed a clean run. Found by a 2026-06-30
  #      dataflow re-audit of epn-billing / lux-main / hlektrologos (the inline grep reported clean).

  # ---- (a) a WP_Error::get_error_data() value flows (taint) into a client response ----
  - id: wp-rest-laundered-error-data
    mode: taint
    languages: [php]
    severity: WARNING
    message: >-
      A WP_Error::get_error_data() value flows into a WP_REST_Response / rest_ensure_response /
      wp_send_json* body — directly or laundered through an array_merge()/intermediate variable
      (a normalizer). WP_Error data routinely carries raw transport / exception text (e.g.
      ['detail' => $resp->get_error_message()]), so this returns internal detail to the client
      (CWE-209). Strip the detail keys server-side; return a curated client shape. (Admin-gated
      handlers — current_user_can in the same function — are intentionally exempt.)
    metadata: { checkId: wp-rest-error-detail-laundered, cwe: "CWE-209", owasp: "A05:2021-Misconfiguration", tier: T1 }
    paths:
      exclude: ["**/wp-admin/**", "**/wp-includes/**", "**/vendor/**", "**/node_modules/**", "**/*.phar", "**/tests/**", "**/*test*.php"]
    pattern-sources:
      - pattern: $E->get_error_data()
      - pattern: $E->get_error_data(...)
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: new \WP_REST_Response(...)
              - pattern: new WP_REST_Response(...)
              - pattern: rest_ensure_response(...)
              - pattern: wp_send_json(...)
              - pattern: wp_send_json_error(...)
              - pattern: wp_send_json_success(...)
          # admin-gated diagnostic surface — exempt (the SAFE pattern: detail behind a cap check)
          - pattern-not-inside: function $FN(...) { ... <... current_user_can(...) ...>; ... }

  # ---- (b) a debug-labeled array key holds a raw internal accessor (the laundered SOURCE) ----
  - id: wp-error-data-array-detail
    languages: [php]
    severity: WARNING
    message: >-
      A debug-labeled array key (detail/debug/trace/stack/sql/query/exception/backtrace) is set to a
      raw internal accessor ($e->getMessage()/getFile()/getLine()/getTraceAsString(),
      $wpe->get_error_message(), $wpdb->last_error). In a WP_Error data array or a to-be-normalized
      array this laundered internal detail reaches the client (CWE-209). Log it server-side; never
      label-and-return it.
    metadata: { checkId: wp-rest-error-detail-laundered, cwe: "CWE-209", owasp: "A05:2021-Misconfiguration", tier: T1 }
    paths:
      exclude: ["**/wp-admin/**", "**/wp-includes/**", "**/vendor/**", "**/node_modules/**", "**/*.phar", "**/tests/**", "**/*test*.php"]
    patterns:
      - pattern-either:
          - pattern: array(..., $K => $V, ...)
          - pattern: "[..., $K => $V, ...]"
      # ONLY the clearly-DEBUG keys. A plain 'error'/'message' key is deliberately NOT matched: a
      # 2026-06-30 fleet scan showed `'error' => $e->getMessage()` is the dominant idiom in real WP
      # code and is usually the INTENDED client message (and is anyway caught inline by
      # wp-rest-exception-detail when it reaches a sink) — including it drowned the rule (~70 of 98
      # hits). These debug-labeled keys do not have a benign client-facing meaning.
      - metavariable-regex:
          metavariable: $K
          regex: "(?i)^['\"](detail|debug|trace|stack|sql|query|exception|backtrace|db_error|sql_error|error_detail)['\"]$"
      - metavariable-pattern:
          metavariable: $V
          pattern-either:
            - pattern: $E->getMessage()
            - pattern: $E->getFile()
            - pattern: $E->getLine()
            - pattern: $E->getTraceAsString()
            - pattern: $WPE->get_error_message()
            - pattern: $wpdb->last_error
      # this rule is the LAUNDERED detector. When the labeled array is DIRECTLY the sink argument,
      # the inline `wp-rest-exception-detail` / `wp-rest-wp-error-detail` rules already cover it —
      # exclude that so the same line is not double-reported under two checkIds.
      - pattern-not-inside: new \WP_REST_Response(...)
      - pattern-not-inside: new WP_REST_Response(...)
      - pattern-not-inside: rest_ensure_response(...)
      - pattern-not-inside: wp_send_json(...)
      - pattern-not-inside: wp_send_json_error(...)
      - pattern-not-inside: wp_send_json_success(...)
      - pattern-not-inside: wp_die(...)
      # SAFE pattern: detail destined only for a logger — exclude the standard sinks (a custom-named
      # logger like my_plugin_log() is a documented residual FP; see README §Honest limits).
      - pattern-not-inside: error_log(...)
      - pattern-not-inside: trigger_error(...)
      # exempt an admin-gated diagnostic builder (cap check in the same function)
      - pattern-not-inside: function $FN(...) { ... <... current_user_can(...) ...>; ... }

  # ---- (c) error detail reflected into a redirect / query arg on a (public) page ----
  - id: wp-error-detail-in-redirect
    languages: [php]
    severity: WARNING
    message: >-
      Exception / WP_Error detail interpolated into a wp_safe_redirect() / wp_redirect() /
      add_query_arg() URL — the raw message rides a query arg back to the browser, often on a
      public callback page (CWE-209, reflected). Redirect with a generic error CODE; map it to a
      user-facing string client-side. (Admin-gated callers are exempt.)
    metadata: { checkId: wp-rest-error-detail-laundered, cwe: "CWE-209", owasp: "A05:2021-Misconfiguration", tier: T1 }
    paths:
      exclude: ["**/wp-admin/**", "**/wp-includes/**", "**/vendor/**", "**/node_modules/**", "**/*.phar", "**/tests/**", "**/*test*.php"]
    patterns:
      # the raw accessor is the matched node; require it to sit inside a redirect / query-arg
      # builder. add_query_arg is covered on its own so the build-then-redirect shape
      # ($u = add_query_arg(.., $e->getMessage(), ..); wp_redirect($u);) is caught at the build site.
      - pattern-either:
          - pattern: $E->get_error_message()
          - pattern: $E->getMessage()
          - pattern: $E->getFile()
          - pattern: $E->getLine()
          - pattern: $E->getTraceAsString()
      - pattern-either:
          - pattern-inside: add_query_arg(...)
          - pattern-inside: wp_safe_redirect(...)
          - pattern-inside: wp_redirect(...)
      - pattern-not-inside: function $FN(...) { ... <... current_user_can(...) ...>; ... }

  # ---- (d) WP_Error wrapping unsanitized upstream/provider body text ----
  - id: wp-error-upstream-text
    languages: [php]
    severity: WARNING
    message: >-
      new WP_Error() whose message is a fallback over an upstream/provider response body
      ($body['error_description'] ?? $body['error']) rather than a curated literal / __() string —
      provider-controlled text propagates into the WP_Error, which conventionally surfaces to the
      user or a redirect (CWE-209). Wrap a curated message; log the upstream text separately. (Only
      the null-coalesce-over-array-access shape is matched, to stay low-FP — a plain
      `new WP_Error('code', $msg)` does NOT fire.)
    metadata: { checkId: wp-rest-error-detail-laundered, cwe: "CWE-209", owasp: "A05:2021-Misconfiguration", tier: T1 }
    paths:
      exclude: ["**/wp-admin/**", "**/wp-includes/**", "**/vendor/**", "**/node_modules/**", "**/*.phar", "**/tests/**", "**/*test*.php"]
    patterns:
      - pattern-either:
          - pattern: new WP_Error($CODE, $X[$K] ?? $Y)
          - pattern: new WP_Error($CODE, $X[$K] ?? $Y, ...)
          - pattern: new \WP_Error($CODE, $X[$K] ?? $Y)
          - pattern: new \WP_Error($CODE, $X[$K] ?? $Y, ...)

  # ---- CWE-327: weak crypto used for signing/auth (NOT cache keys) ----
  - id: wp-weak-crypto-signing
    languages: [php]
    severity: WARNING
    message: >-
      md5/sha1 assigned to a signing/auth-named variable — not a secure hash for
      passwords/tokens/signatures (CWE-327). Use password_hash() or hash_hmac('sha256', ...).
      (Cache-key/transient md5() is fine and intentionally not matched.)
    metadata: { checkId: wp-weak-crypto, cwe: "CWE-327", owasp: "A02:2021-Crypto-Failures", tier: T1 }
    paths:
      exclude: ["**/wp-admin/**", "**/wp-includes/**", "**/vendor/**", "**/node_modules/**", "**/*.phar", "**/tests/**", "**/*test*.php"]
    patterns:
      - pattern-either:
          - pattern: $T = md5(...);
          - pattern: $T = sha1(...);
      - metavariable-regex:
          metavariable: $T
          regex: '^\$(password|passwd|pwd|token|secret|sig|signature|hash|hmac|apikey|api_key|auth)$'

  # ---- CWE-345: a Cloudflare Turnstile / reCAPTCHA TEST sitekey baked into source ----
  - id: wp-turnstile-test-sitekey
    languages: [php]
    severity: WARNING
    message: >-
      A Cloudflare Turnstile TEST sitekey (0x0000000000000000000000) is hardcoded in PHP —
      the widget always-passes and enforces no bot protection (CWE-345). Read the real key
      from config and fail closed if unset.
    metadata: { checkId: turnstile-test-key, cwe: "CWE-345", tier: T1 }
    paths:
      exclude: ["**/vendor/**", "**/node_modules/**", "**/*.phar", "**/tests/**", "**/*test*.php"]
    patterns:
      - pattern-regex: '0x0{22}'

  # ---- CWE-79: unescaped output (ADVISORY / T2 — too FP-heavy to ever promote) ----
  - id: wp-unescaped-output
    languages: [php]
    severity: WARNING
    message: >-
      echo/print of a plain variable with no esc_html/esc_attr/esc_url/wp_kses — possible
      XSS (CWE-79). ADVISORY only (echoing a known int is benign); never promote fleet-wide.
    metadata: { checkId: wp-unescaped-output, cwe: "CWE-79", owasp: "A03:2021-Injection", tier: T2 }
    paths:
      exclude: ["**/wp-admin/**", "**/wp-includes/**", "**/vendor/**", "**/node_modules/**", "**/*.phar", "**/woocommerce/**", "**/tests/**", "**/*test*.php"]
    patterns:
      - pattern-either:
          - pattern: echo $_GET[...];
          - pattern: echo $_POST[...];
          - pattern: echo $_REQUEST[...];
          - pattern: echo $_SERVER[...];
          - pattern: print $_GET[...];
          - pattern: print $_REQUEST[...];
